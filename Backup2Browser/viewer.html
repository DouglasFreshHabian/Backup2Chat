<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SMS Backup Viewer</title>

<style>

body {
  font-family: Arial;
  margin:0;
  background:#f0f0f0;
}

/* Layout */

.container{
  display:flex;
  height:100vh;
}

/* Sidebar */

.sidebar{
  width:260px;
  background:#2d2d2d;
  color:white;
  overflow-y:auto;
  padding:15px;
}

.thread{
  padding:10px;
  cursor:pointer;
  border-bottom:1px solid #444;
}

.thread:hover{
  background:#444;
}

/* Chat area */

.chat-area{
  flex:1;
  overflow-y:auto;
  padding:30px;
}

/* message bubbles */

.msg{
  padding:10px;
  margin:8px;
  border-radius:8px;
  max-width:70%;
}

.sent{
  background:#DCF8C6;
  margin-left:auto;
}

.received{
  background:white;
}

.time{
  font-size:11px;
  color:#666;
}

p{
  margin:4px 0;
}

/* toolbar */

.toolbar{
  padding:10px;
  background:#ddd;
}

.search{
  padding:6px;
  width:250px;
}

/* dark mode */

.dark body{
  background:#121212;
}

.dark .chat-area{
  background:#121212;
  color:white;
}

.dark .received{
  background:#2a2a2a;
}

.dark .sent{
  background:#056162;
}

.dark .toolbar{
  background:#1f1f1f;
}

.dark .sidebar{
  background:#111;
}

button{
  margin-left:8px;
}

.toolbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px;
  background:#ddd;
}

.toolbar-left{
  flex:1;
}

.toolbar-center{
  flex:1;
  text-align:center;
  font-size:20px;
  font-weight:700;
  letter-spacing:3px;
  text-transform:uppercase;
}

.dark .toolbar-center{
  color:#00ffaa;
}

.toolbar-right{
  flex:1;
  text-align:right;
}

.toolbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px;
  background:#ddd;
  border-bottom:4px solid #333;
}

</style>
</head>

<body>

<div class="toolbar">

<div class="toolbar-left">

<input
  type="text"
  id="search"
  class="search"
  placeholder="Search messages..."
  onkeyup="searchMessages()"
/>

</div>

<div class="toolbar-center">
Fresh Forensics 🔎
</div>

<div class="toolbar-right">

<button onclick="toggleDark()">🌙 Dark Mode</button>
<button onclick="exportThread()">Export Thread</button>

</div>

</div>

<div class="container">

<div class="sidebar" id="threads">
<!-- threads generated here -->
</div>

<div class="chat-area" id="chat">

<div id="stats" style="margin-bottom:20px;font-size:14px;"></div>

<h2>Select a conversation</h2>

<!-- conversations inserted here -->

</div>

</div>

<script>

/* Build thread list */

let seen = new Set()

document.querySelectorAll(".conversation").forEach(conv => {

  let number = conv.dataset.number

  if(seen.has(number)) return
  seen.add(number)

  let count = conv.querySelectorAll(".msg").length

  let thread = document.createElement("div")
  thread.className = "thread"
  thread.innerText = number + " (" + count + ")"

  thread.onclick = () => showThread(number)

  document.getElementById("threads").appendChild(thread)

})

function showThread(number){

  let threads = document.querySelectorAll(".conversation")

  threads.forEach(t => t.style.display="none")

  let target = document.querySelector(
    '.conversation[data-number="'+number+'"]'
  )

  if(target){

    target.style.display="block"

    window.currentThread = target

    /* calculate stats */

    let msgs = target.querySelectorAll(".msg")

    let total = msgs.length
    let sent = target.querySelectorAll(".msg.sent").length
    let received = target.querySelectorAll(".msg.received").length

    let times = target.querySelectorAll(".time")

    let first = times[0]?.innerText || ""
    let last = times[times.length-1]?.innerText || ""

    document.getElementById("stats").innerHTML =
      "<b>Conversation Stats</b><br>" +
      "Total Messages: " + total + "<br>" +
      "Sent: " + sent + "<br>" +
      "Received: " + received + "<br>" +
      "First Message: " + first + "<br>" +
      "Last Message: " + last

  }

}

/* live search */

function searchMessages(){

  let q = document
          .getElementById("search")
          .value
          .toLowerCase()

  document.querySelectorAll(".msg").forEach(m => {

    if(m.innerText.toLowerCase().includes(q)){
      m.style.display="block"
    }else{
      m.style.display="none"
    }

  })

}


/* dark mode */

function toggleDark(){

  document.body.classList.toggle("dark")

}


/* export conversation */

function exportThread(){

  if(!window.currentThread){
    alert("Select a conversation first")
    return
  }

  let html = window.currentThread.innerHTML

  let blob = new Blob([html], {type:"text/html"})

  let a = document.createElement("a")

  a.href = URL.createObjectURL(blob)

  a.download = "conversation.html"

  a.click()

}

</script>

</body>
</html>
